<head>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>

<div class="page-details-utilisateur">
  <h2>Details de l'utilisateur</h2>

  <div id="messageDetailsUtilisateur" class="message"></div>
  <p id="chargementDetailsUtilisateur" class="indicateur-chargement"></p>

  <img id="detailsAvatar" class="avatar-utilisateur" src="" alt="Avatar de l'utilisateur" style="display:none;">

  <table id="tableDetailsUtilisateur">
    <tbody>
      <tr><th>Nom</th><td id="detailsNom"></td></tr>
      <tr><th>Prenom</th><td id="detailsPrenom"></td></tr>
      <tr><th>Age</th><td id="detailsAge"></td></tr>
      <tr><th>Pseudo</th><td id="detailsPseudo"></td></tr>
      <tr><th>Email</th><td id="detailsEmail"></td></tr>
      <tr><th>Pays</th><td id="detailsPays"></td></tr>
      <tr><th>Devise</th><td id="detailsDevise"></td></tr>
      <tr><th>Couleur preferee</th><td id="detailsCouleur"></td></tr>
      <tr><th>Type de compte</th><td id="detailsAdmin"></td></tr>
    </tbody>
  </table>

  <button id="boutonRetourListe">Retour a la liste</button>
</div>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Espace Stagiaire</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>

  <header class="entete">
    <div class="logo"><i class="fa-solid fa-graduation-cap logo-icone"></i> Espace Stagiaire</div>
    <div class="zone-utilisateur">
      <img id="avatarEntete" class="avatar-entete" src="images/avatar-defaut.svg" alt="Avatar">
      <span id="nomUtilisateurConnecte"></span>
      <button id="boutonDeconnexion"><i class="fa-solid fa-right-from-bracket"></i> Se Deconnecter</button>
    </div>
  </header>

  <nav class="barre-navigation" id="barreNavigation">
    <!-- Menu horizontal genere en JavaScript -->
  </nav>

  <div class="zone-principale">
    <aside class="index" id="indexVertical">
      <!-- Menu vertical genere en JavaScript -->
    </aside>

    <main class="section-contenu" id="sectionContenu">
      <!-- Le contenu des pages est charge ici dynamiquement -->
    </main>
  </div>

  <footer class="pied-de-page">
    <p>Institut Specialise de Technologie Appliquee Hay Salam, Rabat, Maroc</p>
    <div class="reseaux-sociaux">
      <a href="#" title="Facebook" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#" title="Instagram" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="#" title="LinkedIn" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
    </div>
    <p class="copyright">© 2026 ISTA Hay Salam</p>
  </footer>

  <script src="js/validation.js"></script>
  <script src="js/api.js"></script>
  <script src="js/accueil.js"></script>
  <script src="js/profil.js"></script>
  <script src="js/couleur.js"></script>
  <script src="js/utilisateurs.js"></script>
  <script src="js/ajouterUtilisateur.js"></script>
  <script src="js/modifierUtilisateur.js"></script>
  <script src="js/detailsUtilisateur.js"></script>
  <script src="js/demandes.js"></script>
  <script src="js/layout.js"></script>
</body>
</html>
